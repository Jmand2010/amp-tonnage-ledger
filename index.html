<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AMP Materials Ledger — Team Asphalt</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
[data-theme="dark"]{
  --bg:#0f1115;--bg2:#181b21;--bg3:#1f232b;
  --border:#2a2f3a;--border2:#353c4a;
  --text:#e8eaf0;--text2:#8c92a4;--text3:#555d70;
  --green:#6fcf4a;--green-bg:#1a2d12;--green-border:#2f5220;
  --red:#f0634a;--red-bg:#2d1512;--red-border:#522520;
  --blue:#4ab4f0;--blue-bg:#0e2030;--blue-border:#1a4060;
  --amber:#f0b84a;--amber-bg:#2a1f08;--amber-border:#5a3e10;
  --purple:#b47ef0;--purple-bg:#1a1030;--purple-border:#4a2a80;
  --shadow:rgba(0,0,0,.5);
}
[data-theme="light"]{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#e8eaef;
  --border:#d8dce6;--border2:#c0c6d4;
  --text:#1a1d24;--text2:#5a6070;--text3:#9098aa;
  --green:#2d7a0a;--green-bg:#eaf5df;--green-border:#8fcc60;
  --red:#c03820;--red-bg:#fdeae5;--red-border:#f09070;
  --blue:#1a6aaa;--blue-bg:#e5f0fa;--blue-border:#70b0e0;
  --amber:#a06800;--amber-bg:#fdf3d8;--amber-border:#e0b050;
  --purple:#6a3ab0;--purple-bg:#f0eafa;--purple-border:#b090e0;
  --shadow:rgba(0,0,0,.12);
}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;transition:background .2s,color .2s;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:30px;height:30px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;color:#fff;flex-shrink:0;}
.logo-text{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--text);}
.logo-sub{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.header-right{display:flex;gap:6px;align-items:center;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite;flex-shrink:0;}
.sync-dot.offline{background:var(--red);box-shadow:0 0 5px var(--red);animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.sync-label{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-right:2px;}
.btn{display:inline-flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;letter-spacing:.03em;white-space:nowrap;}
.btn:hover{border-color:var(--text2);color:var(--text);}
.btn-green{background:var(--green-bg);border-color:var(--green-border);color:var(--green);}
.btn-green:hover{filter:brightness(1.12);}
.btn-red{background:var(--red-bg);border-color:var(--red-border);color:var(--red);}
.btn-red:hover{filter:brightness(1.12);}
.btn-blue{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue);}
.btn-blue:hover{filter:brightness(1.12);}
.btn-amber{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber);}
.btn-amber:hover{filter:brightness(1.12);}
.btn-purple{background:var(--purple-bg);border-color:var(--purple-border);color:var(--purple);}
.btn-purple:hover{filter:brightness(1.12);}
.tracker-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:.6rem 1.5rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.tracker-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);white-space:nowrap;}
select{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;outline:none;}
select:focus{border-color:var(--text2);}
main{max-width:1200px;margin:0 auto;padding:1.5rem;}
/* ── STATS ── */
.stats-primary{display:grid;gap:10px;margin-bottom:10px;}
.stats-primary.cols3{grid-template-columns:repeat(3,1fr);}
.stats-primary.cols4{grid-template-columns:repeat(4,1fr);}
.stats-primary.cols5{grid-template-columns:repeat(5,1fr);}
.stats-mix{display:grid;gap:10px;margin-bottom:20px;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;transition:background .3s;}
.stat-card.compact{padding:.8rem 1rem;}
.stat-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stat-value{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:var(--text);line-height:1;}
.stat-value.small{font-size:18px;}
.stat-value .unit{font-size:11px;color:var(--text3);margin-left:3px;}
.stat-card.green .stat-value{color:var(--green);}
.stat-card.red   .stat-value{color:var(--red);}
.stat-card.blue  .stat-value{color:var(--blue);}
.stat-card.amber .stat-value{color:var(--amber);}
.stat-card.gray  .stat-value{color:var(--text2);}
.stat-card.purple .stat-value{color:var(--purple);}
.mix-label{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* ── ALERT FLASH ── */
@keyframes flashAmber{0%,100%{background:var(--bg2)}50%{background:rgba(240,184,74,.15)}}
@keyframes flashRed{0%,100%{background:var(--bg2)}50%{background:rgba(240,99,74,.20)}}
@keyframes flashSA{0%,100%{background:var(--bg2)}50%{background:rgba(240,184,74,.18)}}
@keyframes flashSR{0%,100%{background:var(--bg2)}50%{background:rgba(240,99,74,.22)}}
.flash-amber{animation:flashAmber 2.2s ease-in-out infinite;}.flash-amber .stat-value{color:var(--amber)!important;}
.flash-red{animation:flashRed 2.2s ease-in-out infinite;}.flash-red .stat-value{color:var(--red)!important;}
.flash-sealer-amber{animation:flashSA 2.2s ease-in-out infinite;}.flash-sealer-amber .stat-value{color:var(--amber)!important;}
.flash-sealer-red{animation:flashSR 2.2s ease-in-out infinite;}.flash-sealer-red .stat-value{color:var(--red)!important;}
/* ── ENTRY PANELS ── */
.entry-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.entry-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.entry-panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem;}
.entry-panel.green-panel{border-color:var(--green-border);}
.entry-panel.red-panel{border-color:var(--red-border);}
.entry-panel.blue-panel{border-color:var(--blue-border);}
.entry-panel.amber-panel{border-color:var(--amber-border);}
.entry-panel.purple-panel{border-color:var(--purple-border);background:rgba(26,16,48,.4);}
.entry-panel.info-panel{border-color:var(--border2);background:var(--bg3);}
.panel-title{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.panel-title::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;}
.panel-title.green{color:var(--green)}.panel-title.green::before{background:var(--green);}
.panel-title.red{color:var(--red)}.panel-title.red::before{background:var(--red);}
.panel-title.blue{color:var(--blue)}.panel-title.blue::before{background:var(--blue);}
.panel-title.amber{color:var(--amber)}.panel-title.amber::before{background:var(--amber);}
.panel-title.purple{color:var(--purple)}.panel-title.purple::before{background:var(--purple);}
.panel-title.gray{color:var(--text3)}.panel-title.gray::before{background:var(--text3);}
.form-row{display:flex;flex-direction:column;gap:7px;}
.form-group{display:flex;gap:7px;}
.form-group-2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
label.field-label{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;margin-bottom:2px;display:block;}
input[type="number"],input[type="text"],input[type="date"]{background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:7px 11px;width:100%;transition:border-color .15s;outline:none;}
input::placeholder{color:var(--text3);}
input:focus{border-color:var(--text2);}
input[readonly]{color:var(--green);border-color:var(--green-border);background:var(--green-bg);cursor:default;}
@keyframes autofillPop{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
.autofilled{animation:autofillPop .3s ease;}
.tank-hint{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:3px;min-height:14px;}
.tank-hint.found{color:var(--green);}
.tank-hint.notfound{color:var(--amber);}
.sub-section{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:2px;}
.sub-section-title{font-size:9px;font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
.sub-section-title.blue{color:var(--blue);}
.sub-section-title.green{color:var(--green);}
.sub-section-title.amber{color:var(--amber);}
.received-badge{background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:6px;padding:8px 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--blue);display:none;margin-top:2px;font-weight:600;}
.received-badge.show{display:block;}
.info-note{font-size:12px;color:var(--text2);line-height:1.7;font-family:'IBM Plex Sans',sans-serif;}
.info-note strong{color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;}
/* ── REGISTER ── */
.register{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.register-header{padding:.75rem 1.25rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.register-title{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.filter-bar{display:flex;gap:7px;align-items:center;}
.filter-bar input{width:180px;font-size:11px;padding:5px 9px;}
table{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:12px;}
thead tr{background:var(--bg3);}
th{padding:9px 14px;text-align:left;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:500;white-space:nowrap;}
th.right{text-align:right;}
td{padding:10px 14px;border-top:1px solid var(--border);vertical-align:middle;}
td.right{text-align:right;}
tr.row-buy{background:var(--green-bg);}
tr.row-use{background:var(--bg2);}
tr.row-log{background:var(--bg2);}
tr.row-fill{background:var(--blue-bg);}
tr.row-reading{background:var(--amber-bg);}
tr.row-sale{background:rgba(45,21,18,.6);}
tr.row-buy:hover,tr.row-use:hover,tr.row-log:hover,tr.row-fill:hover,tr.row-reading:hover,tr.row-sale:hover{filter:brightness(1.08);}
.tag{display:inline-block;font-size:9px;letter-spacing:.06em;padding:2px 6px;border-radius:3px;text-transform:uppercase;}
.tag-buy{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);}
.tag-use{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red);}
.tag-log{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);}
.tag-fill{background:var(--blue-bg);border:1px solid var(--blue-border);color:var(--blue);}
.tag-reading{background:var(--amber-bg);border:1px solid var(--amber-border);color:var(--amber);}
.tag-sale{background:rgba(45,21,18,.9);border:1px solid var(--red-border);color:var(--red);}
.amount-buy{color:var(--green);font-weight:600;}
.amount-use{color:var(--red);font-weight:600;}
.amount-fill{color:var(--blue);font-weight:600;}
.amount-sale{color:var(--red);font-weight:600;}
.balance-cell{color:var(--text);font-weight:600;}
.note-text{color:var(--text3);font-size:10px;display:block;margin-top:1px;font-family:'IBM Plex Sans',sans-serif;}
.del-btn{background:none;border:1px solid transparent;cursor:pointer;color:var(--text3);font-size:11px;padding:3px 7px;border-radius:4px;transition:all .15s;opacity:0;font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
tr:hover .del-btn{opacity:1;}
.del-btn:hover{color:var(--red);background:var(--red-bg);border-color:var(--red-border);}
.del-btn.confirm-step{color:var(--red);background:var(--red-bg);border-color:var(--red);opacity:1;animation:pulseBorder .7s ease-in-out infinite;}
@keyframes pulseBorder{0%,100%{box-shadow:0 0 0 0 rgba(240,99,74,0)}50%{box-shadow:0 0 0 3px rgba(240,99,74,.4)}}
.empty-state{padding:2.5rem;text-align:center;color:var(--text3);font-family:'IBM Plex Mono',monospace;font-size:12px;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:600;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:1.75rem;max-width:340px;width:90%;text-align:center;}
.modal h3{font-family:'IBM Plex Mono',monospace;font-size:13px;margin-bottom:8px;}
.modal p{font-size:12px;color:var(--text2);margin-bottom:1.25rem;}
.modal-actions{display:flex;gap:10px;justify-content:center;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);opacity:0;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:10px 22px;border-radius:8px;box-shadow:0 6px 20px var(--shadow);transition:all .22s;z-index:800;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#toast.green{border-color:var(--green-border);color:var(--green);}
#toast.red{border-color:var(--red-border);color:var(--red);}
#toast.blue{border-color:var(--blue-border);color:var(--blue);}
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
#loading-screen .spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-screen p{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text3);}
@media print{
  body{background:#fff;color:#000;}
  header,.tracker-bar .btn,.header-right,.del-btn,.filter-bar button,#loading-screen{display:none!important;}
  .stats-primary,.stats-mix,.register{break-inside:avoid;}
  .stat-card{background:#f5f5f5!important;border:1px solid #ccc;animation:none!important;}
  .stat-label,.stat-value{color:#000!important;}
  .register{background:#fff;border:1px solid #ccc;}
  table{font-size:11px;}th{background:#eee;color:#333;}td{border-top:1px solid #ddd;}
  tr.row-buy{background:#f0f7ea!important;}tr.row-use,tr.row-log{background:#fff!important;}
  tr.row-fill{background:#e8f2fc!important;}tr.row-reading{background:#fef8e8!important;}
  tr.row-sale{background:#fde8e3!important;}
  main{padding:0;max-width:100%;}.entry-grid-2,.entry-grid-3{display:none;}
}
@media(max-width:900px){
  .entry-grid-3{grid-template-columns:1fr 1fr;}
  .stats-primary.cols4,.stats-primary.cols5{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
  .entry-grid-2,.entry-grid-3,.stats-primary{grid-template-columns:1fr;}
  main{padding:1rem;}
  header,.tracker-bar{padding:0 1rem;}
}
</style>
</head>
<body>

<div id="loading-screen"><div class="spinner"></div><p>Connecting to database...</p></div>

<header>
  <div class="logo">
    <div class="logo-mark">AMP</div>
    <div>
      <div class="logo-text">Materials Ledger</div>
      <div class="logo-sub">Team Asphalt · Spring Valley, WI</div>
    </div>
  </div>
  <div class="header-right">
    <div class="sync-dot" id="sync-dot"></div>
    <span class="sync-label" id="sync-label">connecting...</span>
    <button class="btn" onclick="window.print()">⎙ Print</button>
    <button class="btn" onclick="exportCSV()">↓ CSV</button>
    <button class="btn" id="theme-btn" onclick="toggleTheme()">☀️ Light</button>
  </div>
</header>

<div class="tracker-bar">
  <span class="tracker-label">Active Tracker:</span>
  <select id="tracker-select" onchange="switchTracker(this.value)">
    <option value="monarch">🏗  Asphalt — Monarch</option>
    <option value="martin"> 🏗  Asphalt — Martin Marietta</option>
    <option value="mixtek"> 🛢  Sealer — MixTek (8,000 gal tank)</option>
  </select>
</div>

<main>
  <div id="stats-bar"></div>
  <div id="entry-area"></div>
  <div class="register">
    <div class="register-header">
      <span class="register-title" id="register-title">Transaction Register</span>
      <div class="filter-bar">
        <input type="text" id="filter-input" placeholder="Filter entries..." oninput="renderTable()"/>
        <button class="btn" onclick="document.getElementById('filter-input').value='';renderTable();">✕ Clear</button>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr id="table-head"></tr></thead>
        <tbody id="register-body">
          <tr><td colspan="9"><div class="empty-state">Connecting to database...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>⚠ Delete this entry?</h3>
    <p>This will permanently remove the transaction.<br/>All balances recalculate automatically.<br/><br/><strong>This cannot be undone.</strong></p>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel — Keep It</button>
      <button class="btn btn-red" onclick="confirmDelete()">Yes, Delete It</button>
    </div>
  </div>
</div>

<div id="toast"></div>

function tankGal(inches){
  const i=Math.round(parseFloat(inches));
  return (i>=1&&i<=96)?TANK[i]:null;
}
function tankLookup(inId,galId,hintId){
  const inEl=document.getElementById(inId),galEl=document.getElementById(galId),hint=hintId?document.getElementById(hintId):null;
  if(!inEl||!galEl)return;
  const v=inEl.value;
  if(v===''||isNaN(parseFloat(v))){galEl.value='';galEl.removeAttribute('readonly');if(hint){hint.textContent='';hint.className='tank-hint';}updateReceivedBadge();return;}
  const g=tankGal(v);
  if(g!==null){
    galEl.value=g;galEl.setAttribute('readonly','readonly');galEl.classList.add('autofilled');setTimeout(()=>galEl.classList.remove('autofilled'),400);
    if(hint){hint.textContent='✓ '+parseFloat(v)+'" = '+g.toLocaleString('en-US',{maximumFractionDigits:3})+' gal';hint.className='tank-hint found';}
  } else {
    galEl.value='';galEl.removeAttribute('readonly');
    if(hint){hint.textContent='⚠ Valid range 1–96". Enter gallons manually if needed.';hint.className='tank-hint notfound';}
  }
  updateReceivedBadge();
}
window.tankLookup=tankLookup;
function updateReceivedBadge(){
  const badge=document.getElementById('received-badge');if(!badge)return;
  const before=parseFloat(document.getElementById('fill-gal-before')?.value)||0;
  const after=parseFloat(document.getElementById('fill-gal-after')?.value)||0;
  if(after>0&&after>=before){
    const r=parseFloat((after-before).toFixed(3));
    badge.textContent='📦 Gallons received from MixTek: '+r.toLocaleString('en-US',{maximumFractionDigits:3});
    badge.classList.add('show');
  } else {badge.classList.remove('show');}
}

/* ══ CALC ENTRIES ════════════════════════════════════════ */
function calcEntries(raw,name){
  const sorted=Object.entries(raw||{}).map(([id,v])=>({id,...v})).sort((a,b)=>a.ts-b.ts);
  if(name==='mixtek'){
    sorted.forEach(e=>{
      if(e.type==='fill'){
        const before=e.gallons_before||0,after=e.gallons_after||0;
        e.delivered=parseFloat((after-before).toFixed(3));
        e.balance=parseFloat(after.toFixed(3));
      } else if(e.type==='reading'){
        e.balance=parseFloat((e.gallons_after||0).toFixed(3));
      } else if(e.type==='sale'){
        // balance not recalculated from sales — sales are tracked separately
        // balance stays as last fill/reading value
        e.balance=null;
      }
    });
  } else if(name==='martin'){
    let r=0; sorted.forEach(e=>{r+=(e.tons||0);e.balance=r;});
  } else {
    let r=0; sorted.forEach(e=>{r+=e.type==='buy'?(e.tons||0):-(e.tons||0);e.balance=r;});
  }
  return sorted.reverse();
}

/* ══ SUBMIT MONARCH ══════════════════════════════════════ */
function submitMonarch(type){
  const tEl=document.getElementById(type==='buy'?'buy-tons':'use-tons');
  const dEl=document.getElementById(type==='buy'?'buy-date':'use-date');
  const sEl=document.getElementById(type==='buy'?'buy-supplier':null);
  const mEl=document.getElementById(type==='buy'?null:'use-mix');
  const nEl=document.getElementById(type==='buy'?'buy-note':'use-note');
  const tons=parseFloat(tEl.value);
  if(!tons||tons<=0){tEl.focus();showToast('Enter a valid tonnage.','red');return;}
  const entry={type,tons,date:dEl.value||today(),note:nEl?nEl.value.trim():'',ts:Date.now()};
  if(type==='buy') entry.supplier=(sEl?sEl.value.trim():'') ||'Monarch';
  if(type==='use') entry.mix=(mEl?mEl.value.trim():'');
  push(dbRefs.monarch,entry)
    .then(()=>{
      tEl.value='';
      if(sEl) sEl.value='';
      if(mEl) mEl.value='';
      if(nEl) nEl.value='';
      showToast(type==='buy'?'+ Purchase recorded.':'− Usage recorded.',type==='buy'?'green':'red');
    })
    .catch(e=>showToast('Error: '+e.message,'red'));
}
window.submitMonarch=submitMonarch;

function renderTable(){
  const filter=(document.getElementById('filter-input')?.value||'').toLowerCase();
  const tbody=document.getElementById('register-body');
  const shown=filter
    ? allEntries.filter(e=>
        (e.supplier||e.mix||e.buyer||'').toLowerCase().includes(filter)||
        (e.note||'').toLowerCase().includes(filter)||
        (e.type||'').toLowerCase().includes(filter))
    : allEntries;

  if(!shown.length){
    const cols=currentTracker==='mixtek'?10:9;
    tbody.innerHTML='<tr><td colspan="'+cols+'"><div class="empty-state">'
      +(filter?'No entries match that filter.':'No entries yet. Add one above.')
      +'</div></td></tr>';
    return;
  }

  tbody.innerHTML=shown.map(e=>{
    if(currentTracker==='monarch'){
      const buy=e.type==='buy';
      return '<tr class="'+(buy?'row-buy':'row-use')+'">'
        +'<td>'+esc(e.date||'—')+'</td>'
        +'<td><span class="tag '+(buy?'tag-buy':'tag-use')+'">'+(buy?'Purchase':'Usage')+'</span></td>'
        +'<td>'+esc(e.supplier||'Monarch')+'</td>'
        +'<td>'+esc(e.mix||'—')+'</td>'
        +'<td class="right '+(buy?'amount-buy':'')+'">'+(buy?'+'+fmt(e.tons):'')+'</td>'
        +'<td class="right '+(!buy?'amount-use':'')+'">'+(!buy?'−'+fmt(e.tons):'')+'</td>'
        +'<td class="right balance-cell">'+fmt(e.balance)+'</td>'
        +'<td><span class="note-text">'+esc(e.note||'')+'</span></td>'
        +'<td><button class="del-btn" id="del-'+e.id+'" onclick="twoStepDelete(event,\''+e.id+'\')">✕ Delete</button></td>'
        +'</tr>';

    } else if(currentTracker==='martin'){
      return '<tr class="row-log">'
        +'<td>'+esc(e.date||'—')+'</td>'
        +'<td><span class="tag tag-log">Log</span></td>'
        +'<td>'+esc(e.mix||e.supplier||'—')+'</td>'
        +'<td class="right amount-buy">+'+fmt(e.tons)+'</td>'
        +'<td class="right balance-cell">'+fmt(e.balance)+'</td>'
        +'<td><span class="note-text">'+esc(e.note||'')+'</span></td>'
        +'<td><button class="del-btn" id="del-'+e.id+'" onclick="twoStepDelete(event,\''+e.id+'\')">✕ Delete</button></td>'
        +'</tr>';

    } else {
      const fill=e.type==='fill', reading=e.type==='reading', sale=e.type==='sale';
      const rowCls=fill?'row-fill':reading?'row-reading':'row-sale';
      const tagCls=fill?'tag-fill':reading?'tag-reading':'tag-sale';
      const tagTxt=fill?'Fill':reading?'Reading':'Sale';
      const inBefore=fill&&e.inches_before?e.inches_before+'"':'—';
      const galBefore=fill?fmt(e.gallons_before||0):'—';
      const inAfter=(fill||reading)&&e.inches_after?e.inches_after+'"':'—';
      const galAfter=(fill||reading)?fmt(e.gallons_after||0):'—';
      let receivedSold='—';
      if(fill) receivedSold='<span class="amount-fill">+'+fmt(e.delivered||0)+'</span>';
      else if(sale) receivedSold='<span class="amount-sale">−'+fmt(e.gallons_sold||0)+'</span>';
      else if(reading) receivedSold='<span style="color:var(--text3);font-size:10px;">snapshot</span>';
      const balCell=sale?'<span style="color:var(--text3);font-size:10px;">—</span>':('<span class="balance-cell">'+fmt(e.balance)+'</span>');
      const noteText=sale?esc(e.buyer||'')+(e.note?' · '+esc(e.note):''):esc(e.note||'');
      return '<tr class="'+rowCls+'">'
        +'<td>'+esc(e.date||'—')+'</td>'
        +'<td><span class="tag '+tagCls+'">'+tagTxt+'</span></td>'
        +'<td class="right">'+inBefore+'</td>'
        +'<td class="right">'+galBefore+'</td>'
        +'<td class="right">'+inAfter+'</td>'
        +'<td class="right">'+galAfter+'</td>'
        +'<td class="right">'+receivedSold+'</td>'
        +'<td class="right">'+balCell+'</td>'
        +'<td><span class="note-text">'+noteText+'</span></td>'
        +'<td><button class="del-btn" id="del-'+e.id+'" onclick="twoStepDelete(event,\''+e.id+'\')">✕ Delete</button></td>'
        +'</tr>';
    }
  }).join('');
}

/* ══ UPDATE STATS ════════════════════════════════════════ */
function updateStats(){
  const t=currentTracker;
  if(t==='monarch'){
    const totalIn=allEntries.filter(e=>e.type==='buy').reduce((s,e)=>s+(e.tons||0),0);
    const totalOut=allEntries.filter(e=>e.type==='use').reduce((s,e)=>s+(e.tons||0),0);
    const bal=allEntries.length?allEntries[0].balance:0;
    setStat('stat-balance',fmt(bal),'ton');
    setStat('stat-in',fmt(totalIn),'ton');
    setStat('stat-out',fmt(totalOut),'ton');
    const card=document.getElementById('stat-balance-card');
    if(card){card.classList.remove('flash-amber','flash-red');if(bal<=800)card.classList.add('flash-red');else if(bal<=1500)card.classList.add('flash-amber');}
    // Mix type breakdown
    const mixMap={};
    allEntries.filter(e=>e.type==='use'&&e.mix).forEach(e=>{
      const k=e.mix.trim(); if(!k) return;
      mixMap[k]=(mixMap[k]||0)+(e.tons||0);
    });
    const mixEl=document.getElementById('stats-mix');
    if(mixEl){
      const keys=Object.keys(mixMap);
      if(keys.length){
        mixEl.innerHTML=keys.sort().map(k=>
          '<div class="stat-card compact purple">'
          +'<div class="stat-label">'+esc(k)+'</div>'
          +'<div class="stat-value small">'+fmt(mixMap[k])+'<span class="unit">ton</span></div>'
          +'<div class="mix-label">used this season</div>'
          +'</div>'
        ).join('');
      } else {
        mixEl.innerHTML='';
      }
    }

  } else if(t==='martin'){
    const total=allEntries.reduce((s,e)=>s+(e.tons||0),0);
    setStat('stat-balance',fmt(total),'ton');
    setStat('stat-in',allEntries.length,'entries');
    // Mix type breakdown
    const mixMap={};
    allEntries.forEach(e=>{
      const k=(e.mix||e.supplier||'').trim(); if(!k||k==='Martin Marietta') return;
      mixMap[k]=(mixMap[k]||0)+(e.tons||0);
    });
    const mixEl=document.getElementById('stats-mix');
    if(mixEl){
      const keys=Object.keys(mixMap);
      if(keys.length){
        mixEl.innerHTML=keys.sort().map(k=>
          '<div class="stat-card compact purple">'
          +'<div class="stat-label">'+esc(k)+'</div>'
          +'<div class="stat-value small">'+fmt(mixMap[k])+'<span class="unit">ton</span></div>'
          +'<div class="mix-label">logged this season</div>'
          +'</div>'
        ).join('');
      } else {
        mixEl.innerHTML='';
      }
    }

  } else {
    const fills=allEntries.filter(e=>e.type==='fill');
    const sales=allEntries.filter(e=>e.type==='sale');
    const received=fills.reduce((s,e)=>s+(e.delivered||0),0);
    const sold=sales.reduce((s,e)=>s+(e.gallons_sold||0),0);
    // Current balance = gallons_after of most recent fill or reading
    const latestLevel=allEntries.find(e=>e.type==='fill'||e.type==='reading');
    const bal=latestLevel?(latestLevel.gallons_after||0):0;
    const pct=Math.min(100,Math.round((bal/8000)*100));
    setStat('stat-balance',fmt(bal),'gal');
    setStat('stat-received',fmt(received),'gal');
    setStat('stat-sold',fmt(sold),'gal');
    setStat('stat-pct',pct,'%');
    const card=document.getElementById('stat-balance-card');
    if(card){card.classList.remove('flash-sealer-amber','flash-sealer-red');if(bal<=2000)card.classList.add('flash-sealer-red');else if(bal<=3500)card.classList.add('flash-sealer-amber');}
  }
}
function setStat(id,val,unit){const el=document.getElementById(id);if(el)el.innerHTML=val+'<span class="unit">'+unit+'</span>';}

/* ══ TWO-STEP DELETE ═════════════════════════════════════ */
function twoStepDelete(evt,id){
  evt.stopPropagation();
  const btn=document.getElementById('del-'+id);if(!btn)return;
  if(btn.classList.contains('confirm-step')){
    clearTimeout(deleteTimers[id]);delete deleteTimers[id];
    remove(ref(db,'ledger_'+currentTracker+'/'+id))
      .then(()=>showToast('Entry deleted.','red'))
      .catch(e=>showToast('Error: '+e.message,'red'));
  } else {
    btn.classList.add('confirm-step');btn.textContent='⚠ Confirm?';
    deleteTimers[id]=setTimeout(()=>{const b=document.getElementById('del-'+id);if(b){b.classList.remove('confirm-step');b.textContent='✕ Delete';}delete deleteTimers[id];},4000);
  }
}
window.twoStepDelete=twoStepDelete;
function closeModal(){pendingDeleteId=null;document.getElementById('modal-bg').classList.remove('open');}
function confirmDelete(){
  if(!pendingDeleteId)return;
  remove(ref(db,'ledger_'+currentTracker+'/'+pendingDeleteId))
    .then(()=>showToast('Entry deleted.','red')).catch(e=>showToast('Error: '+e.message,'red'));
  closeModal();
}
window.closeModal=closeModal;window.confirmDelete=confirmDelete;

/* ══ CSV EXPORT ══════════════════════════════════════════ */
function exportCSV(){
  const t=currentTracker;let rows;
  if(t==='monarch'){
    rows=[['Date','Type','Supplier','Mix Type','Note','Tons','Balance (ton)']];
    [...allEntries].reverse().forEach(e=>rows.push([e.date,e.type==='buy'?'Purchase':'Usage',e.supplier||'',e.mix||'',e.note||'',e.tons,e.balance]));
  } else if(t==='martin'){
    rows=[['Date','Mix Type','Note','Tons Logged','Running Total (ton)']];
    [...allEntries].reverse().forEach(e=>rows.push([e.date,e.mix||e.supplier||'',e.note||'',e.tons,e.balance]));
  } else {
    rows=[['Date','Type','Inches Before','Gal Before','Inches After','Gal After','Gal Received','Gal Sold','Balance (gal)','Note/Buyer']];
    [...allEntries].reverse().forEach(e=>rows.push([
      e.date,e.type,
      e.inches_before||'',e.gallons_before||'',
      e.inches_after||'',e.gallons_after||0,
      e.type==='fill'?(e.delivered||0):'',
      e.type==='sale'?(e.gallons_sold||0):'',
      e.balance||'',
      e.type==='sale'?(e.buyer||'')+(e.note?' - '+e.note:''):(e.note||'')
    ]));
  }
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='amp-'+t+'-ledger.csv';a.click();URL.revokeObjectURL(url);
}
window.exportCSV=exportCSV;

/* ══ HELPERS ═════════════════════════════════════════════ */
function fmt(n){if(n===undefined||n===null)return'—';return Number(n).toLocaleString('en-US',{maximumFractionDigits:3});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function today(){return new Date().toISOString().slice(0,10);}
function setTodayDates(ids){ids.forEach(id=>{const el=document.getElementById(id);if(el)el.value=today();});}
function showToast(msg,cls){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show'+(cls?' '+cls:'');
  clearTimeout(t._t);t._t=setTimeout(()=>{t.className='';},3200);
}

buildUI();
initAllListeners();
</script>
